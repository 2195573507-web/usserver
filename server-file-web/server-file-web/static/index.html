<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>服务器文件结构</title>
<style>
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#0f1623;--border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;
  --shadow:0 18px 50px rgba(0,0,0,.35);--radius:16px;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#0d1117 0%,#111827 100%);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:5;background:rgba(13,17,23,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
h1{margin:0;font-size:1.35rem;letter-spacing:.02em}.sub{color:var(--muted);font-family:var(--mono);font-size:.82rem}.status{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--green);font-size:.85rem}.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.wrap{padding:22px;display:grid;grid-template-columns:320px minmax(0,1fr);gap:20px;max-width:1600px;margin:0 auto}.card{background:rgba(22,27,34,.88);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card h2{margin:0;padding:16px 18px;border-bottom:1px solid var(--border);font-size:1rem}.card-body{padding:16px 18px}
.pathbar{display:flex;gap:10px;margin-bottom:14px}.pathbar input{flex:1;background:#0d1117;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-family:var(--mono);outline:none}.pathbar input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.15)}button{background:#238636;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}button:hover{filter:brightness(1.08)}button.secondary{background:#21262d;color:var(--text);border:1px solid var(--border)}
.quick{display:flex;flex-direction:column;gap:8px}.quick button{text-align:left;font-family:var(--mono);font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.summary-grid{display:grid;gap:10px}.summary-item{border:1px solid var(--border);background:var(--panel2);border-radius:12px;padding:12px}.summary-path{font-family:var(--mono);color:var(--blue);font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.summary-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:.8rem}
.breadcrumb{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}.crumb{font-family:var(--mono);color:var(--blue);cursor:pointer;padding:4px 8px;border-radius:8px}.crumb:hover{background:#21262d}.meta{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px;margin-bottom:14px}.meta div{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px}.meta span{display:block;color:var(--muted);font-size:.75rem}.meta b{font-family:var(--mono);font-size:.9rem}
table{width:100%;border-collapse:collapse;overflow:hidden}th,td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,.8);text-align:left}th{color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.06em;background:rgba(13,17,23,.6);position:sticky;top:73px}tr:hover{background:rgba(88,166,255,.08)}.name{display:flex;align-items:center;gap:9px;font-family:var(--mono);cursor:pointer}.icon{font-size:1.05rem}.dir .name{color:var(--blue)}.file .name{color:var(--text)}.link .name{color:var(--purple)}.error .name{color:var(--red)}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-size:.72rem;color:var(--muted);font-family:var(--mono)}
.notice{padding:14px;border:1px solid var(--border);background:var(--panel2);border-radius:12px;color:var(--muted)}.loading{color:var(--muted);padding:18px}.error-text{color:var(--red)}
@media(max-width:900px){.wrap{grid-template-columns:1fr;padding:14px}.meta{grid-template-columns:1fr 1fr}header{padding:14px}.status{margin-left:0}th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none}}
</style>
</head>
<body>
<header>
  <div>
    <h1>📁 服务器文件结构</h1>
    <div class="sub">Read-only filesystem browser · port 9300</div>
  </div>
  <div class="status"><span class="dot"></span><span id="serviceStatus">连接中</span></div>
</header>

<div class="wrap">
  <aside class="card">
    <h2>快速入口</h2>
    <div class="card-body">
      <div class="quick" id="quickPaths"></div>
    </div>
    <h2>目录概览</h2>
    <div class="card-body">
      <div class="summary-grid" id="summary"><div class="loading">正在扫描常用目录...</div></div>
    </div>
  </aside>

  <main class="card">
    <h2>文件树</h2>
    <div class="card-body">
      <div class="pathbar">
        <input id="pathInput" value="/" spellcheck="false" autocomplete="off">
        <button onclick="goInput()">打开</button>
        <button class="secondary" onclick="loadPath(currentPath)">刷新</button>
      </div>
      <div id="browser"><div class="loading">正在加载...</div></div>
    </div>
  </main>
</div>

<script>
const $ = s => document.querySelector(s);
let currentPath = '/';

function esc(v){return String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function icon(type){return ({dir:'📁',file:'📄',link:'🔗',socket:'🔌',fifo:'↔️',char:'⌨️',block:'💽',error:'⚠️'}[type] || '❔');}
async function api(url){const res = await fetch(url); if(!res.ok) throw new Error(`HTTP ${res.status}`); return res.json();}

function renderBreadcrumb(path){
  if(path === '/') return '<div class="breadcrumb"><span class="crumb" onclick="loadPath(\'/\')">/</span></div>';
  const parts = path.split('/').filter(Boolean); let acc = '';
  return '<div class="breadcrumb"><span class="crumb" onclick="loadPath(\'/\')">/</span>' + parts.map(p => {
    acc += '/' + p;
    return `<span class="muted">/</span><span class="crumb" onclick="loadPath('${esc(acc)}')">${esc(p)}</span>`;
  }).join('') + '</div>';
}

function renderBrowser(data){
  if(!data.ok){ $('#browser').innerHTML = `<div class="notice error-text">${esc(data.error || '加载失败')}</div>`; return; }
  const entry = data.entry || {};
  const rows = (data.children || []).map(item => {
    const cls = item.type || 'unknown';
    const target = item.target ? ` <span class="muted">→ ${esc(item.target)}</span>` : '';
    const clickable = item.type === 'dir' || item.type === 'link';
    return `<tr class="${cls}">
      <td><div class="name" ${clickable ? `onclick="loadPath('${esc(item.path)}')"` : ''}><span class="icon">${icon(item.type)}</span><span>${esc(item.name)}</span>${target}</div></td>
      <td><span class="pill">${esc(item.type)}</span></td>
      <td class="muted">${esc(item.size_human)}</td>
      <td class="muted">${esc(item.mode)}</td>
      <td class="muted">${esc(item.mtime_text)}</td>
    </tr>`;
  }).join('');
  const parent = data.parent ? `<button class="secondary" onclick="loadPath('${esc(data.parent)}')">返回上级</button>` : '';
  $('#browser').innerHTML = `
    ${renderBreadcrumb(data.path)}
    <div class="meta">
      <div><span>当前路径</span><b>${esc(data.path)}</b></div>
      <div><span>类型</span><b>${esc(entry.type)}</b></div>
      <div><span>权限</span><b>${esc(entry.mode)}</b></div>
      <div><span>子项</span><b>${(data.children || []).length}${data.truncated ? '+' : ''}</b></div>
    </div>
    <div style="margin-bottom:12px;display:flex;gap:8px;">${parent}</div>
    ${data.is_file ? '<div class="notice">这是文件。当前版本只显示文件结构，不直接读取文件内容。</div>' : `
      <table><thead><tr><th>名称</th><th>类型</th><th>大小</th><th>权限</th><th>修改时间</th></tr></thead><tbody>${rows || '<tr><td colspan="5" class="muted">目录为空</td></tr>'}</tbody></table>
      ${data.truncated ? '<div class="notice" style="margin-top:12px;">结果过多，已截断显示。</div>' : ''}
    `}
  `;
}

async function loadPath(path){
  currentPath = path || '/';
  $('#pathInput').value = currentPath;
  $('#browser').innerHTML = '<div class="loading">正在加载...</div>';
  try { renderBrowser(await api('/api/list?path=' + encodeURIComponent(currentPath))); }
  catch(err){ $('#browser').innerHTML = `<div class="notice error-text">加载失败：${esc(err.message)}</div>`; }
}

function goInput(){ loadPath($('#pathInput').value.trim() || '/'); }
$('#pathInput').addEventListener('keydown', e => { if(e.key === 'Enter') goInput(); });

async function init(){
  try{
    const status = await api('/api/status');
    $('#serviceStatus').textContent = '运行中';
    $('#quickPaths').innerHTML = status.quick_paths.map(p => `<button class="secondary" onclick="loadPath('${esc(p)}')">${esc(p)}</button>`).join('');
    loadPath('/');
    const summary = await api('/api/summary');
    $('#summary').innerHTML = summary.items.map(item => `<div class="summary-item">
      <div class="summary-path" onclick="loadPath('${esc(item.path)}')">${esc(item.path)}</div>
      <div class="summary-stats"><span>📁 ${item.dirs}</span><span>📄 ${item.files}</span><span>💾 ${item.size_human}</span></div>
    </div>`).join('');
  } catch(err){
    $('#serviceStatus').textContent = '连接失败';
    $('#serviceStatus').style.color = 'var(--red)';
    $('#browser').innerHTML = `<div class="notice error-text">服务连接失败：${esc(err.message)}</div>`;
  }
}
init();
</script>
</body>
</html>
